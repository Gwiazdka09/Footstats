name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      # ruff: błędy składni (E9) + pyflakes (F) na całym repo — blokujący.
      - name: Ruff lint
        run: python -m ruff check src/ tests/

      # mypy: wąski czysty zakres (scrapers/sources) — ratchet w górę z czasem.
      - name: Mypy type-check (scrapers/sources)
        run: python -m mypy src/footstats/scrapers/sources/

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      # bandit (SAST): blokuje przy MEDIUM+ severity. False-positive oznaczone # nosec.
      - name: Bandit SAST (src)
        run: python -m bandit -r src/footstats -ll

      # pip-audit: CVE w zależnościach FootStats (requirements.txt). Świeży install = realny zakres.
      - name: pip-audit (dependency CVE)
        run: python -m pip_audit -r requirements.txt

  secrets:
    runs-on: ubuntu-latest
    # Dependabot PR-y dostają read-only token bez dostępu do secrets → gitleaks-action failuje.
    # Bumpy wersji nie dodają sekretów do źródła, więc skip jest bezpieczny.
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # pełna historia — gitleaks skanuje też stare commity

      # gitleaks: skan sekretów (klucze/hasła) wg .gitleaks.toml
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  test:
    runs-on: ubuntu-latest

    env:
      FOOTBALL_API_KEY: "test"
      APISPORTS_KEY: "test"
      BZZOIRO_KEY: "test"
      GROQ_API_KEY: "test"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,ai]"

      # --cov-fail-under: floor anty-regresyjny (zmierzone ~58%). Ratchet w górę
      # z czasem aż do globalnego celu 80% (jak zakres mypy w jobie lint).
      - name: Run tests + coverage gate
        run: >
          python -m pytest tests/ --tb=short
          --cov=src/footstats --cov-report=term-missing --cov-fail-under=57

      - name: Check imports
        run: python -c "import footstats; print('Import OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t footstats-api:ci .

      - name: Verify health endpoint in container
        run: |
          docker run --rm -d -p 8000:8000 \
            -e SECRET_KEY="test-secret-key-32-chars-long!!" \
            -e ALLOWED_ORIGINS="http://localhost:3000" \
            --name footstats-ci footstats-api:ci
          sleep 8
          curl -f http://localhost:8000/health
          docker stop footstats-ci
