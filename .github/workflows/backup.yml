name: Daily DB Backup

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily (07:00 Warsaw)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      # Prod data = Neon (PostgreSQL). pg_dump off-site do GCS (redundancja PITR Neona).
      # Neon = PG17; apt-default daje pg_dump 16 → "server version mismatch". Instaluj
      # postgresql-client-17 z oficjalnego repo pgdg (wrapper /usr/bin/pg_dump bierze najnowszy).
      - name: Install postgresql-client 17 (Neon = PG17)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Run Neon backup
        env:
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
        run: bash scripts/backup_db.sh

      - name: Prune backups older than 30 days
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y%m%d)
          gcloud storage ls gs://${{ secrets.BUCKET_NAME }}/backups/ \
            | grep -E "neon_[0-9]" \
            | while read f; do
                FDATE=$(echo "$f" | grep -oP '\d{8}')
                if [[ "$FDATE" < "$CUTOFF" ]]; then
                  gcloud storage rm "$f"
                fi
              done
