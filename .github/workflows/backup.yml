name: Daily DB Backup

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily (07:00 Warsaw)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      # Prod data = Neon (PostgreSQL). pg_dump off-site do GCS (redundancja PITR Neona).
      - name: Install postgresql-client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Run Neon backup
        env:
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
        run: bash scripts/backup_db.sh

      - name: Prune backups older than 30 days
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y%m%d)
          gcloud storage ls gs://${{ secrets.BUCKET_NAME }}/backups/ \
            | grep -E "neon_[0-9]" \
            | while read f; do
                FDATE=$(echo "$f" | grep -oP '\d{8}')
                if [[ "$FDATE" < "$CUTOFF" ]]; then
                  gcloud storage rm "$f"
                fi
              done
