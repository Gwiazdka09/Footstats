# pre-commit — gate'y lokalne PRZED commitem (shift-left DevSecOps).
# Instalacja jednorazowo:  pip install pre-commit && pre-commit install
# Te same narzędzia co w CI (ruff/bandit/gitleaks) — łap problem zanim trafi do repo.
repos:
  # Higiena plików
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: detect-private-key   # łapie wklejony klucz prywatny

  # Lint (zgodny z CI: E9 składnia + F pyflakes)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff
        args: ["check"]

  # SAST — bandit (MEDIUM+; konfiguracja jak w CI)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-ll"]
        exclude: ^tests/

  # Skan sekretów — gitleaks (używa .gitleaks.toml)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
